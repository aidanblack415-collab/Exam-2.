<html lang="en">
<head>

      color: white;
      padding: 11px 16px;
      border-radius: 10px;
      cursor: pointer;

      background: #9aa0a6;
      cursor: not-allowed;
    }
    .feedback {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      display: none;

      color: #555;

</head>
<body>
  <div class="wrap">
    <h1>USCP Practice Test</h1>
    <div class="meta">

      <span class="pill">Instant Feedback</span>

      <div class="small" id="scoreLine"></div>
      <div class="question" id="question"></div>
      <form id="choicesForm"></form>
      <div class="btns">

        <button id="nextBtn" type="button" disabled>Next Question</button>

      <div class="feedback" id="feedback"></div>

      <p id="finalScore"></p>
      <p id="finalPercent"></p>
      <button id="restartBtn" type="button">Restart Test</button>
    </div>
  </div>

          D: "Arrest both parties unless one admits fault"

          B: "Move the WTM closer to the doorway if needed",
          C: "Run only one test pass every week",
          D: "Disable zone lights to prevent visitors from seeing them"
        },
        answer: "A",
        explanation: "Before each shift, officers verify power, alarm function, and zone light operation."
      },
      {
        q: "Who is allowed to move or adjust the walk-through magnetometer?",
        choices: {
          A: "Any sworn officer assigned to the post",
          B: "Only Security Services Bureau employees and USCP-approved vendors",
          C: "Only the Watch Commander",
          D: "Any officer after notifying Communications"
        },
        answer: "B",
        explanation: "Officers cannot move or adjust the WTM; only Security Services Bureau personnel and approved vendors may do so."
      },
      {
        q: "A current Member of Congress escorts three visitors who are not exempt from screening and insists they all bypass screening. What is the best action?",
        choices: {
          A: "Deny entry to everyone",
          B: "Allow entry without documenting it",
          C: "Firmly and courteously advise screening requirements, allow the Member and guests to enter if the Member insists, document the Member’s name, number of guests, and time on a CP-60, and notify a supervisor",
          D: "Arrest the guests for refusing screening"
        },
        answer: "C",
        explanation: "That is the exact procedure described in the notes for a Member of Congress escorting non-exempt individuals."
      },
      {
        q: "During open building hours, a congressional staffer approaches a staff or visitor entrance but does not display identification. How should the screener treat the person?",
        choices: {
          A: "As exempt because staff do not need to display ID if recognized",
          B: "As a visitor",
          C: "As automatically denied entry for the day",
          D: "As a law enforcement exemption"
        },
        answer: "B",
        explanation: "If staff do not show identification, they are treated as a visitor."
      },
      {
        q: "What is the correct initial positioning for an officer screening with a WTM?",
        choices: {
          A: "Stand directly inside the arch so you can stop people faster",
          B: "Stand six feet behind the arch facing away from traffic",
          C: "Stand approximately two feet away from the WTM and face the incoming flow of people",
          D: "Stand beside the x-ray machine only"
        },
        answer: "C",
        explanation: "The notes specify standing about two feet from the WTM and facing the incoming flow."
      },
      {
        q: "Which person below is listed as exempt from screening requirements in the notes?",
        choices: {
          A: "Any congressional intern after hours",
          B: "Any staff member without a BAC",
          C: "Armed law enforcement officers with proper credentials",
          D: "Any visitor carrying a secure package"
        },
        answer: "C",
        explanation: "Exemptions include armed law enforcement officers with proper credentials, certain officials, USCP sworn employees, and others specifically listed."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const progressEl = document.getElementById("progress");
    const scoreLineEl = document.getElementById("scoreLine");
    const questionEl = document.getElementById("question");
    const choicesForm = document.getElementById("choicesForm");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const quizEl = document.getElementById("quiz");
    const summaryEl = document.getElementById("summary");
    const finalScoreEl = document.getElementById("finalScore");
    const finalPercentEl = document.getElementById("finalPercent");
    const restartBtn = document.getElementById("restartBtn");

    function renderQuestion() {
      answered = false;
      feedbackEl.style.display = "none";
      feedbackEl.className = "feedback";
      checkBtn.disabled = false;
      nextBtn.disabled = true;

      const q = questions[current];
      progressEl.textContent = `Question ${current + 1} of ${questions.length}`;
      scoreLineEl.textContent = `Score: ${score} / ${questions.length}`;
      questionEl.textContent = q.q;

      choicesForm.innerHTML = "";
      Object.entries(q.choices).forEach(([letter, text]) => {
        const label = document.createElement("label");
        label.className = "choice";
        label.innerHTML = `
          <input type="radio" name="answer" value="${letter}">
          <strong>${letter}.</strong> ${text}
        `;
        choicesForm.appendChild(label);
      });
    }

    function checkAnswer() {
      if (answered) return;

      const selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        feedbackEl.style.display = "block";
        feedbackEl.className = "feedback incorrect";
        feedbackEl.innerHTML = "<strong>Select an answer first.</strong>";
        return;
      }

      const q = questions[current];
      const userAnswer = selected.value;
      const correct = q.answer === userAnswer;

      if (correct) score++;

      answered = true;
      checkBtn.disabled = true;
      nextBtn.disabled = false;
      feedbackEl.style.display = "block";
      feedbackEl.className = "feedback " + (correct ? "correct" : "incorrect");
      feedbackEl.innerHTML = `
        <strong>${correct ? "Correct." : "Incorrect."}</strong>
        The correct answer is <strong>${q.answer}</strong>.<br><br>
        ${q.explanation}
      `;

      scoreLineEl.textContent = `Score: ${score} / ${questions.length}`;
    }

    function nextQuestion() {
      if (current < questions.length - 1) {
        current++;
        renderQuestion();
      } else {
        showSummary();
      }
    }

    function showSummary() {
      quizEl.style.display = "none";
      summaryEl.style.display = "block";
      const percent = ((score / questions.length) * 100).toFixed(1);
      finalScoreEl.textContent = `Final Score: ${score} / ${questions.length}`;
      finalPercentEl.textContent = `Percentage: ${percent}%`;
    }

    function restartTest() {
      current = 0;
      score = 0;
      quizEl.style.display = "block";
      summaryEl.style.display = "none";
      renderQuestion();
    }

    checkBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartTest);

    renderQuestion();
  </script>
</body>
</html>
